    <!-- Theme (auto/light/dark): apply stored choice early to avoid flash; the toggle lives in the navbar -->
    <script>
    (function(){
        var stored = localStorage.getItem('theme'); // 'light' | 'dark' | null (= auto)
        if (stored) { document.documentElement.setAttribute('data-theme', stored); }
        function getMode(){
            return localStorage.getItem('theme') || 'auto';
        }
        function updateThemeIcon(mode){
            var el = document.getElementById('themeToggle');
            if (!el) { return; }
            var icons  = { auto:'🌓', light:'☀️', dark:'🌙' };
            var isEn = localStorage.getItem('lang') === 'en';
            var titles = isEn
                ? { auto:'Theme: auto (system)', light:'Theme: light', dark:'Theme: dark' }
                : { auto:'Тема: авто (системна)', light:'Тема: світла', dark:'Тема: темна' };
            var hint = isEn ? ' — click to change' : ' — натисніть, щоб змінити';
            el.textContent = icons[mode];
            el.setAttribute('title', titles[mode] + hint);
        }
        function applyMode(mode){
            if (mode === 'auto') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.removeItem('theme');
            } else {
                document.documentElement.setAttribute('data-theme', mode);
                localStorage.setItem('theme', mode);
            }
            updateThemeIcon(mode);
        }
        window.toggleTheme = function(){
            var next = { auto:'light', light:'dark', dark:'auto' };
            applyMode(next[getMode()]);
        };
        document.addEventListener('DOMContentLoaded', function(){ updateThemeIcon(getMode()); });
    })();
    </script>
